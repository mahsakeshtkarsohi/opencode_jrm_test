# Databricks App manifest — JRM Media Advisor
# Deploy with: databricks apps deploy jrm-media-advisor --source-code-path .
# Or via DABs: databricks bundle deploy --target dev
#
# Auth model: on-behalf-of (OBO) user auth.
# The Databricks App runtime injects the logged-in user's access token in the
# x-forwarded-access-token HTTP header. The app reads this header on every
# request — no service principal or PAT secret is needed.
# OBO scopes (sql, dashboards.genie) are configured in the Databricks App UI.

command:
  - streamlit
  - run
  - src/jrm_advisor/app/app.py
  - --server.port
  - "8000"
  - --server.address
  - "0.0.0.0"
  - --server.headless
  - "true"

env:
  # ── Backend toggle ─────────────────────────────────────────────────────────
  # Set to "true" during local development to use the deterministic mock.
  # Must be "false" (or unset) in the deployed Databricks App.
  - name: USE_MOCK_BACKEND
    value: "false"

  # ── Feedback table location ────────────────────────────────────────────────
  - name: FEEDBACK_CATALOG
    value: "dsa_development"
  - name: FEEDBACK_SCHEMA
    value: "retail_media"
  - name: FEEDBACK_TABLE
    value: "jrm_advisor_feedback"

  # ── Databricks workspace ───────────────────────────────────────────────────
  - name: DATABRICKS_HOST
    value: "https://adb-8342392658526315.15.azuredatabricks.net"

  # ── Genie Space ────────────────────────────────────────────────────────────
  - name: GENIE_SPACE_ID
    value: "01f11870eeca18398f56b6a649bcda49"

  # ── Knowledge Base endpoint ────────────────────────────────────────────────
  - name: KB_ENDPOINT_URL
    value: "https://adb-8342392658526315.15.azuredatabricks.net/serving-endpoints/ka-c3f1fbaf-endpoint/invocations"

  # ── LLM composer endpoint ──────────────────────────────────────────────────
  - name: COMPOSER_ENDPOINT
    value: "https://adb-8342392658526315.15.azuredatabricks.net/serving-endpoints/databricks-claude-sonnet-4-6/invocations"

  # ── SQL Warehouse for campaign resolver + feedback writer ──────────────────
  - name: DATABRICKS_SQL_WAREHOUSE_ID
    value: "033514a136656dc0"

  # ── Campaign resolver thresholds (optional — defaults apply if unset) ──────
  - name: CAMPAIGN_RESOLVER_THRESHOLD
    value: "0.7"
  - name: CAMPAIGN_RESOLVER_AMBIGUITY_GAP
    value: "0.05"

  # ── MLflow experiment ──────────────────────────────────────────────────────
  - name: MLFLOW_EXPERIMENT_NAME
    value: "/Shared/jrm-advisor-eval"
